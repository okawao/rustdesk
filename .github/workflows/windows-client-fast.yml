name: Windows Client Fast Build

on:
  workflow_dispatch:
    inputs:
      upload-artifact:
        description: Upload build artifact
        type: boolean
        default: true

env:
  SCITER_RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # Keep this in sync with flutter-build.yml
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  RS_PUB_KEY: "${{ secrets.RS_PUB_KEY }}"
  RENDEZVOUS_SERVER: "${{ secrets.RENDEZVOUS_SERVER }}"
  API_SERVER: "${{ secrets.API_SERVER }}"
  FORCED_FIXED_CONNECTION_PASSWORD: "${{ secrets.FORCED_FIXED_CONNECTION_PASSWORD }}"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-windows-client:
    name: Build Windows Flutter Client (x64)
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure hbb_common compatibility
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q "decode_permanent_password_h1_from_storage" libs/hbb_common/src/config.rs; then
            echo "Detected incompatible hbb_common submodule, updating to remote HEAD..."
            git submodule sync --recursive
            git submodule update --init --recursive --remote libs/hbb_common
          fi
          echo "hbb_common commit: $(git -C libs/hbb_common rev-parse --short HEAD)"
          grep -q "decode_permanent_password_h1_from_storage" libs/hbb_common/src/config.rs
          grep -q "OPTION_USE_RAW_TCP_FOR_API" libs/hbb_common/src/config.rs
          grep -q "HttpProxyRequest" libs/hbb_common/protos/rendezvous.proto

      - name: Inject custom server settings
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RENDEZVOUS_SERVER:-}" ] || [ -z "${RS_PUB_KEY:-}" ]; then
            echo "RENDEZVOUS_SERVER and RS_PUB_KEY must be configured in GitHub Secrets."
            exit 1
          fi
          echo "::add-mask::${RENDEZVOUS_SERVER}"
          echo "::add-mask::${RS_PUB_KEY}"
          if [ -n "${API_SERVER:-}" ]; then
            echo "::add-mask::${API_SERVER}"
          fi
          if [ -n "${FORCED_FIXED_CONNECTION_PASSWORD:-}" ]; then
            echo "::add-mask::${FORCED_FIXED_CONNECTION_PASSWORD}"
          fi
          python3 - <<'PY'
          import os
          import pathlib
          import re

          rendezvous = os.environ["RENDEZVOUS_SERVER"].strip()
          pubkey = os.environ["RS_PUB_KEY"].strip()
          api = os.environ.get("API_SERVER", "").strip()

          config_path = pathlib.Path("libs/hbb_common/src/config.rs")
          content = config_path.read_text(encoding="utf-8")
          content_new = re.sub(
              r'pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[[^\]]*\];',
              f'pub const RENDEZVOUS_SERVERS: &[&str] = &["{rendezvous}"];',
              content,
              count=1,
          )
          content_new = re.sub(
              r'pub const RS_PUB_KEY: &str = ".*?";',
              f'pub const RS_PUB_KEY: &str = "{pubkey}";',
              content_new,
              count=1,
          )
          if content_new == content:
              raise SystemExit("Failed to inject RENDEZVOUS_SERVER/RS_PUB_KEY into config.rs")
          config_path.write_text(content_new, encoding="utf-8")

          if api:
              common_path = pathlib.Path("src/common.rs")
              common = common_path.read_text(encoding="utf-8")
              common_new = common.replace(
                  '"https://admin.rustdesk.com".to_owned()',
                  f'"{api}".to_owned()',
                  1,
              )
              if common_new == common:
                  raise SystemExit("Failed to inject API_SERVER into src/common.rs")
              common_path.write_text(common_new, encoding="utf-8")
          PY

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # https://github.com/flutter/flutter/issues/155685
      - name: Replace engine with rustdesk custom flutter engine
        shell: pwsh
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          Move-Item -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff "$(dirname "$(dirname "$(which flutter)")")"
          cd "$(dirname "$(dirname "$(which flutter)")")"
          [[ "3.24.5" == "${{ env.FLUTTER_VERSION }}" ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022-quick

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        shell: bash
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log" || true

      - name: Build rustdesk windows flutter client
        shell: pwsh
        run: |
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          Move-Item -Force ./flutter/build/windows/x64/runner/Release ./rustdesk

      - name: find Runner.res
        # Windows: find Runner.res (compiled from ./flutter/windows/runner/Runner.rc), copy to ./Runner.res
        # Runner.rc does not contain actual version, but Runner.res does
        continue-on-error: true
        shell: bash
        run: |
          runner_res=$(find . -name "Runner.res");
          if [ "$runner_res" == "" ]; then
            echo "Runner.res: not found";
          else
            echo "Runner.res: $runner_res";
            cp $runner_res ./libs/portable/Runner.res;
            echo "list ./libs/portable/Runner.res";
            ls -l ./libs/portable/Runner.res;
          fi

      - name: Build self-extracted executable
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          mv ./target/release/rustdesk-portable-packer.exe ./SignOutput/rustdesk-windows-client-x64.exe

      - name: Upload windows client artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@master
        with:
          name: rustdesk-windows-client-x64
          path: |
            rustdesk
            SignOutput/rustdesk-windows-client-x64.exe
